
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasa Connect BD - আধুনিক মাদ্রাসা ইকোসিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-black: #111827;
            --pure-white: #ffffff;
            --bd-green: #006a4e;
            --soft-grey: #f9fafb;
            --border-color: #e5e7eb;
        }
        body {
            font-family: 'Noto Sans Bengali', 'Inter', sans-serif;
            background-color: var(--pure-white);
            color: var(--pure-black);
            -webkit-font-smoothing: antialiased;
        }
        .minimal-border {
            border: 1px solid var(--border-color);
        }
        .text-balanced {
            text-wrap: balance;
        }
        .hover-darken {
            transition: all 0.2s ease;
        }
        .hover-darken:hover {
            background-color: var(--pure-black);
            color: var(--pure-white);
        }
        /* World class typography spacing */
        h1, h2, h3 {
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        .caps-label {
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 0.65rem;
            font-weight: 700;
        }
        /* Remove all glassmorphism and heavy shadows */
        .no-shadow {
            box-shadow: none !important;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--soft-grey);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--pure-black);
        }
    </style>
